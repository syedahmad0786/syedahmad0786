<svg width="820" height="440" viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ahmad Bukhari — AI and Automation Architect">
  <style>
    .win { fill: #0d1117; stroke: #30363d; stroke-width: 1.5; }
    .bar { fill: #161b22; }
    .bartxt { fill: #8b949e; font: 13px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .prompt { fill: #7ee787; font: 600 15px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .cmd { fill: #e6edf3; font: 15px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .out { fill: #8b949e; font: 15px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .hl { fill: #79c0ff; font: 600 16px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .accent { fill: #ffa657; font: 15px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .mission { fill: #d2a8ff; font: italic 15px 'Cascadia Code','Fira Code',Consolas,'Courier New',monospace; }
    .line { opacity: 0; animation: reveal .4s ease forwards; }
    .l1 { animation-delay: .2s; }  .l2 { animation-delay: .7s; }
    .l3 { animation-delay: 1.2s; } .l4 { animation-delay: 1.7s; }
    .l5 { animation-delay: 2.2s; } .l6 { animation-delay: 2.7s; }
    .l7 { animation-delay: 3.2s; } .l8 { animation-delay: 3.7s; }
    .l9 { animation-delay: 4.2s; }
    .cursor { fill: #7ee787; animation: blink 1.1s steps(1) infinite; animation-delay: 4.4s; opacity: 0; }
    @keyframes reveal { to { opacity: 1; } }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  </style>

  <!-- window -->
  <rect class="win" x="10" y="10" width="800" height="420" rx="12"/>
  <!-- title bar -->
  <path class="bar" d="M10 22 a12 12 0 0 1 12 -12 h776 a12 12 0 0 1 12 12 v26 h-800 z"/>
  <circle cx="34" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="54" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="74" cy="30" r="6" fill="#27c93f"/>
  <text class="bartxt" x="410" y="35" text-anchor="middle">ahmad@github: ~</text>

  <!-- line 1 -->
  <g class="line l1">
    <text class="prompt" x="34" y="86">ahmad@github:~$</text>
    <text class="cmd" x="182" y="86">whoami</text>
  </g>
  <g class="line l2">
    <text class="hl" x="34" y="114">Ahmad Bukhari — AI &amp; Automation Architect</text>
  </g>

  <!-- line 2 -->
  <g class="line l3">
    <text class="prompt" x="34" y="158">ahmad@github:~$</text>
    <text class="cmd" x="182" y="158">cat journey.log</text>
  </g>
  <g class="line l4">
    <text class="accent" x="34" y="186">no-code&#160;&#160;&#8594;&#160;&#160;low-code&#160;&#160;&#8594;&#160;&#160;vibe-coding&#160;&#160;&#8594;&#160;&#160;code</text>
    <text class="out" x="34" y="210">// kept hitting ceilings, so I learned to build past them</text>
  </g>

  <!-- line 3 -->
  <g class="line l5">
    <text class="prompt" x="34" y="254">ahmad@github:~$</text>
    <text class="cmd" x="182" y="254">ls ~/stack</text>
  </g>
  <g class="line l6">
    <text class="out" x="34" y="282">python&#160;&#160;javascript&#160;&#160;claude-agent-sdk&#160;&#160;mcp&#160;&#160;n8n&#160;&#160;rest-apis&#160;&#160;webhooks</text>
  </g>

  <!-- line 4 -->
  <g class="line l7">
    <text class="prompt" x="34" y="326">ahmad@github:~$</text>
    <text class="cmd" x="182" y="326">echo $MISSION</text>
  </g>
  <g class="line l8">
    <text class="mission" x="34" y="354">"build agentic systems that run real businesses — not just demos"</text>
  </g>

  <!-- final prompt + cursor -->
  <g class="line l9">
    <text class="prompt" x="34" y="398">ahmad@github:~$</text>
  </g>
  <rect class="cursor" x="184" y="384" width="9" height="18"/>
</svg>
